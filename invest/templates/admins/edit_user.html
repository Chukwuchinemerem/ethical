{% extends 'admins/base.html' %}
{% block title %}Edit User – Admin | Ethical Finance{% endblock %}
{% block page_title %}Edit User: {{ user_obj.username }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto glass rounded-3xl p-8 border border-white/5">
  <h2 class="font-display text-xl font-bold text-white mb-4">Edit User Details</h2>
  <form method="post" class="space-y-5">
    {% csrf_token %}
    <div class="grid gap-4 lg:grid-cols-2">
      <div>
        <label class="text-slate-400 text-xs uppercase tracking-wider mb-1.5 block font-medium">Username</label>
        <input type="text" name="username" value="{{ user_obj.username }}" required
          class="w-full px-4 py-3 rounded-xl text-white focus:outline-none" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);">
      </div>
      <div>
        <label class="text-slate-400 text-xs uppercase tracking-wider mb-1.5 block font-medium">Email</label>
        <input type="email" name="email" value="{{ user_obj.email }}" required
          class="w-full px-4 py-3 rounded-xl text-white focus:outline-none" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);">
      </div>
      <div>
        <label class="text-slate-400 text-xs uppercase tracking-wider mb-1.5 block font-medium">First Name</label>
        <input type="text" name="first_name" value="{{ user_obj.first_name }}"
          class="w-full px-4 py-3 rounded-xl text-white focus:outline-none" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);">
      </div>
      <div>
        <label class="text-slate-400 text-xs uppercase tracking-wider mb-1.5 block font-medium">Last Name</label>
        <input type="text" name="last_name" value="{{ user_obj.last_name }}"
          class="w-full px-4 py-3 rounded-xl text-white focus:outline-none" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);">
      </div>
      <div>
        <label class="text-slate-400 text-xs uppercase tracking-wider mb-1.5 block font-medium">Phone</label>
        <input type="text" name="phone" value="{{ user_obj.phone }}"
          class="w-full px-4 py-3 rounded-xl text-white focus:outline-none" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);">
      </div>
      <div>
        <label class="text-slate-400 text-xs uppercase tracking-wider mb-1.5 block font-medium">Country</label>
        <input type="text" name="country" value="{{ user_obj.country }}"
          class="w-full px-4 py-3 rounded-xl text-white focus:outline-none" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);">
      </div>
      <div class="lg:col-span-2">
        <label class="text-slate-400 text-xs uppercase tracking-wider mb-1.5 block font-medium">Password</label>
        <input type="password" name="password" placeholder="Leave blank to keep current password"
          class="w-full px-4 py-3 rounded-xl text-white focus:outline-none" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);">
      </div>
    </div>
    <button type="submit" class="btn-green w-full py-3.5 rounded-xl font-bold text-sm">Save Changes</button>
  </form>
</div>
{% endblock %}
