services:
  - type: web
    name: aspenoptions
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn profitLynx.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    releaseCommand: "python3 manage.py create_superuser"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: aspenoptions-db
          property: connectionString

databases:
  - name: aspenoptions-db
    plan: free
